name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codeswitch
    env:
      SECRET_KEY: ci-only-secret-key-that-is-long-enough-for-django-checks-123456789
      DEBUG: "True"
      AXES_ENABLED: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: codeswitch/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test --verbosity 2
      - run: python manage.py check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codeswitch/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: codeswitch/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
